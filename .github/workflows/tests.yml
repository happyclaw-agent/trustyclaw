name: Tests

on: [push, pull_request]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run ruff
        run: uv run ruff check .

      - name: Run full unit test suite
        working-directory: ${{ github.workspace }}
        env:
          PYTHONPATH: src
        run: uv run pytest src/tests/unit -v --tb=short

      - name: Verify SDK imports
        working-directory: ${{ github.workspace }}
        env:
          PYTHONPATH: src
        run: |
          uv run python -c "
          from trustyclaw.sdk.client import SolanaClient
          from trustyclaw.sdk.identity import AgentIdentity
          from trustyclaw.sdk.reputation import ReputationEngine
          from trustyclaw.sdk.escrow import EscrowClient
          print('All imports successful')
          "

      - name: Run smoke tests
        working-directory: ${{ github.workspace }}
        env:
          PYTHONPATH: src
        run: uv run python scripts/smoke_tests.py

      - name: Run demo (mock mode only)
        working-directory: ${{ github.workspace }}
        env:
          PYTHONPATH: src
        run: uv run python demo.py --mock
