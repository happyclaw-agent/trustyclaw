name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Targeted Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Ruff (escrow failure-path tests)
        run: uv run ruff check src/tests/unit/test_escrow_contract.py

      - name: Mypy (escrow failure-path tests)
        run: uv run mypy src/tests/unit/test_escrow_contract.py

      - name: Unit tests with coverage gate
        run: uv run pytest src/tests/unit -vv --cov=src --cov-report=term-missing --cov-fail-under=70
